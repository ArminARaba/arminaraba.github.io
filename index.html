<!DOCTYPE html>
<html lang="en">
<head>
  <title>My Website</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    /* Style the header */
    .header {
      background-color: #f1f1f1;
      padding: 20px;
      text-align: center;
    }

    /* Style the logo */
    .logo {
      width: 100px;
      height: auto;
    }

    /* Style the navigation bar */
    .navbar {
      display: flex;
      justify-content: center;
      align-items: center;
      margin-top: 20px;
    }

    /* Style the navigation links */
    .navbar a {
      color: black;
      text-decoration: none;
      padding: 12px 16px;
    }

    /* Change the color of links on hover */
    .navbar a:hover {
      background-color: #ddd;
      color: black;
    }

    /* Style the main section */
    .main {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-around;
      align-items: center;
      margin: 20px;
    }

    /* Style the main content */
    .content {
      max-width: 600px;
    }

    /* Style the main image */
    .image {
      width: 400px;
      height: auto;
    }

    /* Style the footer */
    .footer {
      background-color: #f1f1f1;
      padding: 10px;
      text-align: center;
    }

    /* Style the footer links */
    .footer a {
      color: black;
      text-decoration: none;
      padding: 5px 10px;
    }

    /* Change the color of footer links on hover */
    .footer a:hover {
      background-color: #ddd;
      color: black;
    }
  </style>
</head>
<body>
  <!-- Header with logo -->
  <div class="header">
    <img src="logo.png" alt="Logo" class="logo">
  </div>

  <!-- Navigation bar with links -->
  <div class="navbar">
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </div>

  <!-- Main section with content and image -->
  <div class="main">
    <div class="content">
      <h1>Welcome to my website</h1>
      <p>This is a simple website that I made with HTML and CSS.</p>
      <p>I hope you like it and find it useful.</p>
    </div>
    <img src="image.jpg" alt="Image" class="image">
  </div>

  <!-- Footer with links -->
  <div class="footer">
    <a href="#">Facebook</a>
    <a href="#">Twitter</a>
    <a href="#">Instagram</a>
  </div>
</body>
</html>
